<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تمارين الرياضيات - ثانية ثانوي</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: Arial;
background:#f2f2f2;
direction: rtl;
}

/* مهم: الرياضيات لا تنقلب */
.math{
direction: ltr;
unicode-bidi: embed;
display: inline-block;
}

h1{text-align:center;}

#menu{
display:flex;
flex-direction:column;
align-items:center;
}

/* ✅ تم إصلاح تمركز الأزرار */
button{
width:260px;
max-width:90%;
padding:15px;
margin:10px auto;
display:block;
font-size:18px;
background:#00695C;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#box{
display:none;
background:white;
width:92%;
margin:20px auto;
padding:25px;
border-radius:15px;
}

.question{margin-top:15px; line-height:2;}
.step{margin-top:6px;}

table{
border-collapse:collapse;
width:100%;
margin-top:15px;
text-align:center;
}

td,th{
border:1px solid black;
padding:8px;
}

canvas{display:none; max-width: 100% !important; height: auto !important;}
</style>
</head>

<body>

<h1>تمارين الرياضيات - السنة الثانية ثانوي</h1>

<div id="menu">
<button onclick="show('func')">الدوال</button>
<button onclick="show('prob')">الإحتمالات</button>
<button onclick="show('ang')">الزوايا الموجهة</button>
</div>

<div id="box">

<h2 id="title"></h2>

<div id="content"></div>

<canvas id="graph" width="400" height="300"></canvas>

<button id="btn" onclick="toggle()">إظهار الحل النموذجي</button>
<div id="sol"></div>

<button onclick="back()">رجوع</button>

</div>

<script>

let chart;

/* ================= المنحنى (فقط الدوال) ================= */
function draw(){
let ctx=document.getElementById("graph").getContext("2d");

let x=[], y=[];

for(let i=-6;i<=6;i+=0.5){
x.push(i);
y.push(i*i-8*i+15);
}

if(chart) chart.destroy();

chart=new Chart(ctx,{
type:"line",
data:{
labels:x,
datasets:[{
label:"f(x)=x²-8x+15",
data:y,
borderWidth:2
}]
},
options: {
    responsive: true,
    maintainAspectRatio: true
}
});
}

/* ================= العرض ================= */
function show(type){

document.getElementById("menu").style.display="none";
document.getElementById("box").style.display="block";

let ex="", sol="", title="";

let g=document.getElementById("graph");
g.style.display="none";

if(type==="func"){

g.style.display="block";

title="تمرين الدوال";

ex=`
<div class="question">لدينا الدالة: <span class="math">f(x)=x²-8x+15</span></div>

<div class="question">1) أعد كتابتها على شكل مربع كامل.</div>
<div class="question">2) استنتج الرأس.</div>
<div class="question">3) حل المتراجحة: <span class="math">f(x) ≤ 0</span></div>
<div class="question">4) حل المعادلة: <span class="math">f(x)=0</span></div>
<div class="question">5) جدول التغيرات.</div>
`;

sol=`

<div class="question"><b>1) التحليل:</b></div>
<div class="step">x² - 8x + 15</div>
<div class="step">x² - 8x + 16 - 1</div>
<div class="step"><span class="math">(x-4)² - 1</span></div>

<hr>

<div class="question"><b>2) الرأس:</b></div>
<div class="step">نكتب: <span class="math">(x-4)² - 1</span></div>
<div class="step">a = 4</div>
<div class="step">b = -1</div>
<div class="step">الرأس: S(4 , -1)</div>

<hr>

<div class="question"><b>3) المتراجحة:</b></div>
<div class="step"><span class="math">(x-4)² - 1 ≤ 0</span></div>
<div class="step"><span class="math">(x-4)² ≤ 1</span></div>
<div class="step">-1 ≤ x - 4 ≤ 1</div>
<div class="step">3 ≤ x ≤ 5</div>

<hr>

<div class="question"><b>4) المعادلة:</b></div>
<div class="step"><span class="math">(x-4)² - 1 = 0</span></div>
<div class="step"><span class="math">(x-4)² = 1</span></div>
<div class="step">x - 4 = ±1</div>
<div class="step">x = 3 أو x = 5</div>

<hr>

<div class="question"><b>5) جدول التغيرات:</b></div>

<table>
<tr><th>x</th><th>-∞</th><th>4</th><th>+∞</th></tr>
<tr><th>f(x)</th><td>↘</td><td>-1</td><td>↗</td></tr>
</table>
`;

setTimeout(draw,200);
}

if(type==="prob"){

title="الإحتمالات";

ex=`
<div class="question">صندوق فيه 4 حمراء و3 زرقاء و3 خضراء.</div>
<div class="question">نسحب كرتين دون إرجاع.</div>

<div class="question">1) نفس اللون</div>
<div class="question">2) لونين مختلفين</div>
<div class="question">3) على الأقل كرة حمراء</div>
<div class="question">4) استقلالية الأحداث</div>
`;

sol=`
<div class="question"><b>القانون:</b></div>
<div class="step">P(A∩B)=P(A)×P(B|A)</div>

<hr>

<div class="question"><b>1)</b></div>
<div class="step">نفس اللون</div>

<hr>

<div class="question"><b>2)</b></div>
<div class="step">ألوان مختلفة</div>

<hr>

<div class="question"><b>3)</b></div>
<div class="step">1 - P(بدون حمراء)</div>

<hr>

<div class="question"><b>4)</b></div>
<div class="step">غير مستقلين</div>
`;
}

if(type==="ang"){

title="الزوايا الموجهة";

ex=`
<div class="question">(AB,AC)=35°</div>
<div class="question">(AC,AD)=-65°</div>
<div class="question">(AD,AE)=120°</div>

<div class="question">1) احسب (AB,AE)</div>
<div class="question">2) تحليل النتيجة</div>
`;

sol=`
<div class="question"><b>القانون:</b></div>
<div class="step">(AB,AE)=(AB,AC)+(AC,AD)+(AD,AE)</div>

<hr>

<div class="question"><b>1)</b></div>
<div class="step">35 - 65 + 120 = 90°</div>

<hr>

<div class="question"><b>2)</b></div>
<div class="step">زاوية موجبة ⇒ اتجاه عكس عقارب الساعة</div>
`;
}

document.getElementById("title").innerHTML=title;
document.getElementById("content").innerHTML=ex;
document.getElementById("sol").innerHTML=sol;

document.getElementById("sol").style.display="none";
document.getElementById("btn").innerText="إظهار الحل النموذجي";
}

/* ================= إظهار / إخفاء ================= */
function toggle(){
let s=document.getElementById("sol");
let b=document.getElementById("btn");

if(s.style.display==="none"){
s.style.display="block";
b.innerText="إخفاء الحل النموذجي";
}else{
s.style.display="none";
b.innerText="إظهار الحل النموذجي";
}
}

/* ================= رجوع ================= */
function back(){
document.getElementById("menu").style.display="flex";
document.getElementById("box").style.display="none";
}

</script>

</body>
</html>
