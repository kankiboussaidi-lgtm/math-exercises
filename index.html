<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تمارين الرياضيات - ثانية ثانوي</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f0f2f5; direction: rtl; margin: 0; padding: 20px; }

/* الإطار الأحمر للمعادلات الذي طلبت الحفاظ عليه */
.math {
    direction: ltr;
    unicode-bidi: embed;
    display: inline-block;
    font-family: "Courier New", Courier, monospace;
    font-weight: bold;
    color: #c62828;
    background: #fff5f5;
    padding: 2px 6px;
    border-radius: 4px;
    border: 1px solid #ffcdd2;
}

h1.main-title, #sub-header {
    text-align: center;
    color: #004d40;
    margin-bottom: 30px;
    font-size: 2.2rem;
    border-bottom: 4px double #00695C;
    display: table;
    margin: 0 auto 30px auto;
}

#sub-header { display: none; color: #c62828; border-bottom-color: #c62828; }

#menu, #sub-menu { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
#sub-menu { display: none; }

button {
    width: 350px;
    max-width: 90%;
    padding: 18px;
    margin: 12px auto;
    display: block;
    font-size: 20px;
    background: #00695C; 
    color: white;
    border: none;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,105,92,0.2);
}

button:hover { background: #004d40; transform: translateY(-3px); }

#box {
    display: none;
    background: white;
    width: 95%;
    max-width: 1000px;
    margin: 20px auto;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
}

#title { text-align: center; color: #00695C; border-bottom: 3px solid #00695C; padding-bottom: 15px; margin-bottom: 25px; }

.question { margin-top: 25px; line-height: 2.2; font-size: 19px; color: #1a1a1a; font-weight: 600;}

.step { margin-top: 20px; color: #333; padding: 20px; border-right: 5px solid #00695C; background: #f1f8f7; border-radius: 0 10px 10px 0; }
.step b { color: #004d40; display: block; margin-bottom: 12px; font-size: 1.2rem; text-decoration: underline; }

.variation-table {
    width: 100%;
    max-width: 550px;
    margin: 25px auto; 
    border-collapse: collapse;
    background: white;
}
.variation-table td {
    border: 2px solid #00695C;
    padding: 15px;
    text-align: center;
    font-weight: bold;
}
.row-label { background: #e0f2f1; color: #004d40; width: 80px; }
.arrow { font-size: 24px; color: #00695C; font-weight: bold; }

canvas { margin: 30px auto; max-width: 100% !important; border-radius: 15px; background: #fff; border: 1px solid #eee; display: block; }

#sol { display: none; margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; }

.btn-back, .btn-sol { background: #00695C !important; margin-top: 30px; }
</style>
</head>
    <body>

<h1 id="main-header" class="main-title">تمارين رياضيات ثانية ثانوي</h1>
<h1 id="sub-header"></h1>

<div id="menu">
    <button onclick="showSubMenu('func')">دوال</button>
    <button onclick="showSubMenu('prob')">احتمالات</button>
    <button onclick="showSubMenu('ang')">زوايا موجهة</button>
</div>

<div id="sub-menu">
    <button id="btn1">تمرين سهل</button>
    <button id="btn2">تمرين متوسط</button>
    <button id="btn3">تمرين صعب</button>
    <button class="btn-back" onclick="backToMain()">العودة</button>
</div>

<div id="box">
    <h2 id="title"></h2>
    <div id="content"></div>
    <canvas id="graph" width="400" height="250"></canvas>
    <button id="btn-toggle" class="btn-sol" onclick="toggle()">إظهار الحل النموذجي المفصل</button>
    <div id="sol"></div>
    <button class="btn-back" onclick="backToSub()">العودة للمستويات</button>
</div>

<script>
let chart;

function showSubMenu(type) {
    document.getElementById("main-header").style.display = "none";
    let subHeader = document.getElementById("sub-header");
    subHeader.style.display = "table";
    if(type === 'func') subHeader.innerText = "تمارين الدوال";
    if(type === 'prob') subHeader.innerText = "تمارين الاحتمالات";
    if(type === 'ang') subHeader.innerText = "تمارين الزوايا الموجهة";
    document.getElementById("menu").style.display = "none";
    document.getElementById("sub-menu").style.display = "flex";
    document.getElementById("btn1").onclick = () => loadExercise(type, 1);
    document.getElementById("btn2").onclick = () => loadExercise(type, 2);
    document.getElementById("btn3").onclick = () => loadExercise(type, 3);
}

function resetSolutionBtn() {
    document.getElementById("sol").style.display = "none";
    document.getElementById("btn-toggle").innerText = "إظهار الحل النموذجي المفصل";
}

function loadExercise(type, level) {
    resetSolutionBtn();
    document.getElementById("sub-menu").style.display = "none";
    document.getElementById("box").style.display = "block";
    let ex = "", sol = "", title = "";
    document.getElementById("graph").style.display = (type === 'func') ? "block" : "none";

    if (type === 'func') {
        if (level === 1) {
            title = "تمرين سهل - الدوال التربيعية";
            ex = `<div class="question">لتكن الدالة <span class="math">f(x) = x² - 4</span>.<br>1) احسب صور الأعداد 0 و 2.<br>2) ادرس شفعية الدالة f.<br>3) ادرس اتجاه تغير f على المجال <span class="math">[0, +∞[</span>.<br>4) شكّل جدول التغيرات.<br>5) عيّن نقاط التقاطع مع حاملي المحورين.</div>`;
            sol = `<div class="step"><b>1) الصور:</b> بتعويض x في العبارة: <span class="math">f(0) = 0²-4 = -4</span> و <span class="math">f(2) = 2²-4 = 0</span>.</div>
                   <div class="step"><b>2) الشفعية:</b> نحسب <span class="math">f(-x) = (-x)²-4 = x²-4</span>. نلاحظ أن <span class="math">f(-x) = f(x)</span>، فالدالة <b>زوجية</b> ومنحناها متناظر بالنسبة لمحور التراتيب.</div>
                   <div class="step"><b>3) اتجاه التغير:</b> لتكن <span class="math">x1 < x2</span> في المجال الموجب. بتربيع الطرفين <span class="math">x1² < x2²</span> ثم طرح 4 نجد <span class="math">f(x1) < f(x2)</span>. إذن الدالة <b>متزايدة تماماً</b> على <span class="math">[0, +∞[</span>. وبما أنها زوجية فهي متناقصة تماماً على المجال السالب.</div>
                   <div class="step"><b>4) جدول التغيرات:</b><table class="variation-table"><tr><td class="row-label">x</td><td>-∞</td><td>0</td><td>+∞</td></tr><tr style="height:80px"><td class="row-label">f(x)</td><td>+∞ <span class="arrow">↘</span></td><td>-4</td><td><span class="arrow">↗</span> +∞</td></tr></table></div>
                   <div class="step"><b>5) التقاطع:</b> مع التراتيب (x=0) هي <span class="math">(0, -4)</span>. مع الفواصل (f(x)=0) نحل <span class="math">x²-4=0</span> نجد <span class="math">x=2, x=-2</span>. النقاط هي <span class="math">(2,0)</span> و <span class="math">(-2,0)</span>.</div>`;
            drawGraphs("x²-4", 1);
        } else if (level === 2) {
            title = "تمرين متوسط - الشكل النموذجي";
            ex = `<div class="question">نعتبر <span class="math">f(x) = -x² + 4x - 3</span>.<br>1) اكتب f(x) على الشكل النموذجي.<br>2) استنتج شعاع الانسحاب V للمنحنى (Cf).<br>3) ادرس اتجاه تغير f.<br>4) شكّل جدول التغيرات.<br>5) حل المعادلة <span class="math">f(x) = 0</span>.</div>`;
            sol = `<div class="step"><b>1) الشكل النموذجي:</b> باستخراج -1 كعامل مشترك: <span class="math">-(x²-4x)-3</span>. بإضافة وطرح مربع نصف معامل x: <span class="math">-(x-2)²+4-3 = -(x-2)²+1</span>.</div>
                   <div class="step"><b>2) الانسحاب:</b> منحنى f هو صورة منحنى الدالة مربع بالانسحاب الذي شعاعه <span class="math">V(2, 1)</span> مع التناظر حول محور الفواصل لأن المعامل سالب.</div>
                   <div class="step"><b>3) اتجاه التغير:</b> بما أن <span class="math">a = -1</span> (سالب)، فالدالة متزايدة على <span class="math">]-∞, 2]</span> ومتناقصة على <span class="math">[2, +∞[</span>.</div>
                   <div class="step"><b>4) جدول التغيرات:</b><table class="variation-table"><tr><td class="row-label">x</td><td>-∞</td><td>2</td><td>+∞</td></tr><tr style="height:80px"><td class="row-label">f(x)</td><td>-∞ <span class="arrow">↗</span></td><td>1</td><td><span class="arrow">↘</span> -∞</td></tr></table></div>
                   <div class="step"><b>5) حل المعادلة:</b> <span class="math">-(x-2)²+1 = 0</span> تعني <span class="math">(x-2)² = 1</span>. إما <span class="math">x-2=1 \Rightarrow x=3</span> أو <span class="math">x-2=-1 \Rightarrow x=1</span>.</div>`;
            drawGraphs("-x²+4x-3", 2);
        } else {
            title = "تمرين صعب - الدوال التناظرية";
            ex = `<div class="question">لتكن <span class="math">f(x) = (2x-4)/(x-1)</span>.<br>1) عيّن مجموعة التعريف والمستقيمات المقاربة.<br>2) جِد العددين a و b بحيث <span class="math">f(x) = a + b/(x-1)</span>.<br>3) ادرس اتجاه تغير f.<br>4) شكّل جدول التغيرات.<br>5) أثبت أن النقطة <span class="math">ω(1, 2)</span> مركز تناظر للمنحنى.</div>`;
            sol = `<div class="step"><b>1) المقاربات:</b> المقام ينعدم عند <span class="math">x=1</span> إذن <span class="math">Df = R - {1}</span>. المقارب العمودي هو <span class="math">x=1</span>. المقارب الأفقي هو <span class="math">y=2</span>.</div>
                   <div class="step"><b>2) التفكيك:</b> بالقسمة الإقليدية أو المطابقة نجد: <span class="math">f(x) = (2x-2-2)/(x-1) = 2 - 2/(x-1)</span>. إذن <span class="math">a=2</span> و <span class="math">b=-2</span>.</div>
                   <div class="step"><b>3) اتجاه التغير:</b> المعامل b سالب، إذن الدالة المرجعية <span class="math">1/(x-1)</span> ضُربت في عدد سالب فتغير اتجاهها لتصبح <b>متزايدة تماماً</b> على مجالي التعريف.</div>
                   <div class="step"><b>4) جدول التغيرات:</b><table class="variation-table"><tr><td class="row-label">x</td><td>-∞</td><td>1</td><td>+∞</td></tr><tr style="height:80px"><td class="row-label">f(x)</td><td>2 <span class="arrow">↗</span></td><td>||</td><td><span class="arrow">↗</span> 2</td></tr></table></div>
                   <div class="step"><b>5) مركز التناظر:</b> نتحقق من <span class="math">f(2-x) + f(x) = 4</span>. بتعويض x نجد النتيجة دائماً 4، وهو ضعف ترتيب ω، إذن ω هي مركز تناظر.</div>`;
            drawGraphs("(2x-4)/(x-1)", 3);
        }
    } else if (type === 'prob') {
        if (level === 1) {
            title = "احتمالات - مستوى سهل";
            ex = `<div class="question">كيس به 4 كرات حمراء و 6 بيضاء. نسحب كرتين بالإرجاع.<br>1) ما عدد الحالات الممكنة؟<br>2) احسب احتمال سحب كرتين حمراوين.<br>3) احسب احتمال سحب كرتين من نفس اللون.<br>4) نعتبر X عدد الكرات الحمراء، ما هي قيمه؟<br>5) احسب الأمل الرياضياتي <span class="math">E(X)</span>.</div>`;
            sol = `<div class="step"><b>1) الحالات:</b> سحب كرتين بالإرجاع من 10 كرات هو <span class="math">10 × 10 = 100</span> حالة.</div>
                   <div class="step"><b>2) كرتان حمراوان:</b> احتمال الأولى حمراء <span class="math">4/10</span> والثانية <span class="math">4/10</span>. الجداء: <span class="math">16/100 = 0.16</span>.</div>
                   <div class="step"><b>3) نفس اللون:</b> (ح،ح) أو (ب،ب). الاحتمال هو <span class="math">(4/10×4/10) + (6/10×6/10) = 0.16 + 0.36 = 0.52</span>.</div>
                   <div class="step"><b>4) قيم X:</b> يمكن أن لا نسحب أي حمراء (0)، أو واحدة (1)، أو اثنتين (2). إذن <span class="math">X \in \{0, 1, 2\}</span>.</div>
                   <div class="step"><b>5) الأمل E(X):</b> نحسب الاحتمالات: <span class="math">P(X=1) = 0.48</span>. إذن <span class="math">E(X) = (0×0.36) + (1×0.48) + (2×0.16) = 0.8</span>.</div>`;
        } else if (level === 2) {
            title = "احتمالات - مستوى متوسط";
            ex = `<div class="question">صندوق به 5 كرات مرقمة {1, 2, 3, 4, 5}. نسحب كرتين دون إرجاع.<br>1) ما عدد الحالات الإجمالية؟<br>2) احسب احتمال سحب كرتين مجموعهما زوجي.<br>3) احسب احتمال سحب كرتين جداؤهما أكبر من 10.<br>4) عيّن قانون الاحتمال للمتغير X (المجموع).<br>5) احسب التباين <span class="math">V(X)</span>.</div>`;
            sol = `<div class="step"><b>1) الحالات:</b> دون إرجاع من 5 كرات هو <span class="math">5 × 4 = 20</span> حالة.</div>
                   <div class="step"><b>2) مجموع زوجي:</b> الحالات هي (فردي، فردي) أو (زوجي، زوجي). عدد الفردية 3 والزوجية 2. الحالات: <span class="math">(3×2) + (2×1) = 8</span>. الاحتمال <span class="math">8/20 = 0.4</span>.</div>
                   <div class="step"><b>3) جداء > 10:</b> الثنائيات هي: (3,4), (4,3), (3,5), (5,3), (4,5), (5,4). عددها 6. الاحتمال <span class="math">6/20 = 0.3</span>.</div>
                   <div class="step"><b>4) قانون X:</b> القيم الممكنة للمجموع هي {3, 4, 5, 6, 7, 8, 9}. نضع جدولاً يربط كل قيمة باحتمالها.</div>
                   <div class="step"><b>5) التباين V(X):</b> نطبق القانون <span class="math">V(X) = E(X²) - [E(X)]²</span>. بعد الحساب نجد التباين.</div>`;
        } else {
            title = "احتمالات - مستوى صعب";
            ex = `<div class="question">نرمي زهرة نرد متوازنة مرتين. المتغير X هو الفرق المطلق بين الرقمين.<br>1) شكّل جدول الإمكانيات (36 حالة).<br>2) ما هي قيم المتغير العشوائي X؟<br>3) عرف قانون الاحتمال لـ X.<br>4) احسب احتمال <span class="math">P(X \ge 3)</span>.<br>5) احسب الانحراف المعياري <span class="math">σ(X)</span>.</div>`;
            sol = `<div class="step"><b>1) الجدول:</b> عبارة عن مربع 6×6 يحتوي على الفروقات |i - j|.</div>
                   <div class="step"><b>2) قيم X:</b> الفرق يمكن أن يكون <span class="math">\{0, 1, 2, 3, 4, 5\}</span>.</div>
                   <div class="step"><b>3) قانون الاحتمال:</b> X=0 (6 مرات)، X=1 (10 مرات)، X=2 (8 مرات)، X=3 (6 مرات)، X=4 (4 مرات)، X=5 (مرتان). المجموع 36.</div>
                   <div class="step"><b>4) الاحتمال:</b> <span class="math">P(X \ge 3) = (6+4+2)/36 = 12/36 = 1/3</span>.</div>
                   <div class="step"><b>5) الانحراف:</b> نحسب <span class="math">V(X) \approx 1.97</span> ثم الجذر التربيعي نجد <span class="math">σ(X) \approx 1.4</span>.</div>`;
        }
    } else if (type === 'ang') {
        if (level === 1) {
            title = "زوايا موجهة - مستوى سهل";
            ex = `<div class="question">1) حوّل 120° إلى الراديان.<br>2) عيّن القيس الرئيسي للزاوية <span class="math">25π/3</span>.<br>3) احسب <span class="math">cos(π/3) + sin(π/6)</span>.<br>4) بسط <span class="math">cos(π-x) + cos(x)</span>.<br>5) حل المعادلة <span class="math">sin x = 1</span> في المجال <span class="math">[0, 2π]</span>.</div>`;
            sol = `<div class="step"><b>1) التحويل:</b> <span class="math">(120 × π) / 180 = 2π/3</span> راديان.</div>
                   <div class="step"><b>2) القيس الرئيسي:</b> <span class="math">25 = 3×8 + 1</span>، إذن <span class="math">25π/3 = 8π + π/3</span>. بما أن 8π دورات كاملة، القيس هو <span class="math">π/3</span>.</div>
                   <div class="step"><b>3) الحساب:</b> <span class="math">1/2 + 1/2 = 1</span>.</div>
                   <div class="step"><b>4) التبسيط:</b> <span class="math">cos(π-x) = -cos x</span>، إذن العبارة <span class="math">-cos x + cos x = 0</span>.</div>
                   <div class="step"><b>5) الحل:</b> الجيب يساوي 1 عند النقطة العلوية للدائرة، أي <span class="math">x = π/2</span>.</div>`;
        } else if (level === 2) {
            title = "زوايا موجهة - مستوى متوسط";
            ex = `<div class="question">1) حل في <span class="math">[0, π]</span> المعادلة <span class="math">2cos x - 1 = 0</span>.<br>2) بسط <span class="math">sin(π+x) + cos(π/2-x)</span>.<br>3) إذا كان <span class="math">cos x = 0.6</span> و x في الربع الأول، احسب sin x.<br>4) برهن أن <span class="math">(cos x + sin x)² = 1 + 2sin x cos x</span>.<br>5) عيّن صور الزاوية <span class="math">kπ/4</span> على الدائرة.</div>`;
            sol = `<div class="step"><b>1) المعادلة:</b> <span class="math">cos x = 1/2 \Rightarrow x = π/3</span> (في المجال المعطى).</div>
                   <div class="step"><b>2) التبسيط:</b> <span class="math">sin(π+x)=-sin x</span> و <span class="math">cos(π/2-x)=sin x</span>. المجموع هو 0.</div>
                   <div class="step"><b>3) الحساب:</b> نستخدم <span class="math">sin²x + cos²x = 1</span>. نجد <span class="math">sin²x = 0.64 \Rightarrow sin x = 0.8</span>.</div>
                   <div class="step"><b>4) البرهان:</b> بنشر المتطابقة الشهيرة: <span class="math">cos²x + sin²x + 2cos x sin x</span>. وبما أن المربعين مجموعهما 1 نجد المطلوب.</div>
                   <div class="step"><b>5) الصور:</b> هي 8 نقاط تقسم الدائرة إلى أجزاء متساوية (0، 45°، 90°...).</div>`;
        } else {
            title = "زوايا موجهة - مستوى صعب";
            ex = `<div class="question">1) عيّن القيس الرئيسي لـ <span class="math">2026π/4</span>.<br>2) حل في <span class="math">R</span> المعادلة <span class="math">2cos²x + cos x - 1 = 0</span>.<br>3) احسب <span class="math">cos(π/12)</span> باستخدام <span class="math">π/3 - π/4</span>.<br>4) بسط <span class="math">sin(x+π) + cos(x-π/2)</span>.<br>5) برهن صحة المساواة <span class="math">cos⁴x - sin⁴x = cos(2x)</span>.</div>`;
            sol = `<div class="step"><b>1) القيس الرئيسي:</b> <span class="math">2026/4 = 506.5</span>. القيس هو <span class="math">0.5π = π/2</span>.</div>
                   <div class="step"><b>2) المعادلة:</b> بوضع <span class="math">X = cos x</span> نحل معادلة من الدرجة الثانية. نجد <span class="math">X = 1/2</span> أو <span class="math">X = -1</span>.</div>
                   <div class="step"><b>3) القيمة الدقيقة:</b> نستخدم قانون <span class="math">cos(a-b)</span>. النتيجة <span class="math">(\sqrt{6}+\sqrt{2})/4</span>.</div>
                   <div class="step"><b>4) التبسيط:</b> <span class="math">-sin x + sin x = 0</span>.</div>
                   <div class="step"><b>5) البرهان:</b> <span class="math">(cos²x-sin²x)(cos²x+sin²x)</span>. القوس الثاني 1 والأول هو دستور ضعف الزاوية.</div>`;
        }
    }
    document.getElementById("title").innerHTML = title;
    document.getElementById("content").innerHTML = ex;
    document.getElementById("sol").innerHTML = sol;
}

function drawGraphs(label, level) {
    let ctx = document.getElementById("graph").getContext("2d");
    let labels = [], data = [];
    for (let x = -3; x <= 5; x += 0.1) {
        let y;
        if (level === 1) y = x*x-4;
        else if (level === 2) y = -x*x+4*x-3;
        else { 
            if(Math.abs(x-1)<0.1) { data.push(null); labels.push(x.toFixed(1)); continue; } 
            y=(2*x-4)/(x-1); 
        }
        labels.push(x.toFixed(1)); data.push(y);
    }
    if (chart) chart.destroy();
    chart = new Chart(ctx, { 
        type: "line", 
        data: { 
            labels: labels, 
            datasets: [{ label: label, data: data, borderColor: "#c62828", fill: false, pointRadius:0 }] 
        }, 
        options: { 
            responsive: true, 
            scales: { y: { min: -10, max: 10 } } 
        } 
    });
}

function toggle() {
    let s = document.getElementById("sol"), b = document.getElementById("btn-toggle");
    s.style.display = (s.style.display === "none") ? "block" : "none";
    b.innerText = (s.style.display === "none") ? "إظهار الحل النموذجي المفصل" : "إخفاء الحل";
}

function backToMain() {
    document.getElementById("sub-menu").style.display = "none";
    document.getElementById("sub-header").style.display = "none";
    document.getElementById("main-header").style.display = "table";
    document.getElementById("menu").style.display = "flex";
}

function backToSub() {
    document.getElementById("box").style.display = "none";
    document.getElementById("sub-header").style.display = "table";
    document.getElementById("sub-menu").style.display = "flex";
}
</script>
