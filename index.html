<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة الرياضيات التعليمية - ثانية ثانوي</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f4f7f6; direction: rtl; margin: 0; padding: 20px; color: #333; }
    
    /* الإطار الأحمر المقدس للمصطلحات والمعادلات */
    .math {
        direction: ltr; unicode-bidi: embed; display: inline-block;
        font-family: "Courier New", Courier, monospace; font-weight: bold;
        color: #d32f2f; background: #fff5f5; padding: 3px 8px;
        border-radius: 5px; border: 1.5px solid #d32f2f; margin: 2px;
    }

    h1.main-title, #sub-header {
        text-align: center; color: #00695c; margin-bottom: 30px; font-size: 2.5rem;
        border-bottom: 5px double #00695c; display: table; margin: 0 auto 30px auto; padding: 10px;
    }
    #sub-header { display: none; color: #d32f2f; border-bottom-color: #d32f2f; }
    
    .container { max-width: 1100px; margin: 0 auto; }
    #menu, #sub-menu { display: flex; flex-direction: column; align-items: center; gap: 15px; }
    #sub-menu { display: none; }

    button {
        width: 380px; max-width: 95%; padding: 20px; font-size: 22px;
        background: #00796b; color: white; border: none; border-radius: 15px;
        cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    button:hover { background: #004d40; transform: scale(1.02); }

    #box {
        display: none; background: white; width: 100%; padding: 40px;
        border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }

    .step { 
        margin-top: 25px; padding: 25px; border-right: 8px solid #00796b; 
        background: #f9f9f9; border-radius: 10px; line-height: 2;
    }
    .step b { color: #004d40; font-size: 1.3rem; display: block; margin-bottom: 10px; border-bottom: 1px solid #ccc; }
    
    .law { background: #e0f2f1; padding: 10px; border-radius: 5px; margin: 10px 0; border: 1px dashed #00796b; }

    .variation-table { 
        width: 100%; max-width: 600px; margin: 20px auto; border-collapse: collapse; background: #fff;
    }
    .variation-table td { border: 2.5px solid #004d40; padding: 15px; text-align: center; font-weight: bold; }
    .row-label { background: #e0f2f1; width: 100px; }
    .arrow { font-size: 25px; color: #00796b; }

    canvas { background: #fff; border: 2px solid #eee; border-radius: 15px; margin: 30px 0; }
    #sol { display: none; }
    .btn-sol { background: #d32f2f !important; }
    .btn-back { background: #546e7a !important; margin-top: 40px; }
</style>
</head>
    <body>
<div class="container">
    <h1 id="main-header" class="main-title">تحضير بكالوريا: ثانية ثانوي</h1>
    <h1 id="sub-header"></h1>

    <div id="menu">
        <button onclick="showSubMenu('func')">محور الدوال العدديّة</button>
        <button onclick="showSubMenu('prob')">محور الاحتمالات</button>
        <button onclick="showSubMenu('ang')">محور الحساب المثلثي</button>
    </div>

    <div id="sub-menu">
        <button id="btn1">تمرين 01 (تأسيسي)</button>
        <button id="btn2">تمرين 02 (متوسط)</button>
        <button id="btn3">تمرين 03 (شامل/صعب)</button>
        <button class="btn-back" onclick="backToMain()">العودة للرئيسية</button>
    </div>

    <div id="box">
        <h2 id="title" style="text-align:center; color:#00796b;"></h2>
        <div id="content"></div>
        <canvas id="graph" width="500" height="300"></canvas>
        <button id="btn-toggle" class="btn-sol" onclick="toggle()">إظهار الحل النموذجي المفصل</button>
        <div id="sol"></div>
        <button class="btn-back" onclick="backToSub()">العودة للمستويات</button>
    </div>
</div>

<script>
let chart;
function showSubMenu(type) {
    document.getElementById("main-header").style.display = "none";
    let subHeader = document.getElementById("sub-header");
    subHeader.style.display = "table";
    subHeader.innerText = (type==='func')?"تمارين الدوال":(type==='prob')?"تمارين الاحتمالات":"تمارين الزوايا";
    document.getElementById("menu").style.display = "none";
    document.getElementById("sub-menu").style.display = "flex";
    document.getElementById("btn1").onclick = () => loadExercise(type, 1);
    document.getElementById("btn2").onclick = () => loadExercise(type, 2);
    document.getElementById("btn3").onclick = () => loadExercise(type, 3);
}

function loadExercise(type, level) {
    document.getElementById("sol").style.display = "none";
    document.getElementById("btn-toggle").innerText = "إظهار الحل النموذجي المفصل";
    document.getElementById("sub-menu").style.display = "none";
    document.getElementById("box").style.display = "block";
    let ex = "", sol = "", title = "";
    document.getElementById("graph").style.display = (type === 'func') ? "block" : "none";

    if (type === 'func') {
        if (level === 1) {
            title = "دراسة دالة مربع مع الإزاحة";
            ex = `<div class="question">نعتبر الدالة <span class="math">f(x) = x² - 4</span>.<br>1. احسب صور الأعداد <span class="math">0</span>، <span class="math">2</span>، <span class="math">-2</span>.<br>2. ادرس شفعية الدالة <span class="math">f</span> مع التعليل.<br>3. ادرس اتجاه تغير الدالة <span class="math">f</span> على المجال <span class="math">[0, +∞[</span>.<br>4. شكّل جدول التغيرات بدقة.<br>5. عين نقاط تقاطع المنحنى مع محور الفواصل.</div>`;
            sol = `<div class="step"><b>1. حساب الصور (التعويض):</b><br>نعوض كل <span class="math">x</span> بالقيمة المعطاة:<br>
                   - <span class="math">f(0) = (0)² - 4 = -4</span><br>
                   - <span class="math">f(2) = (2)² - 4 = 4 - 4 = 0</span><br>
                   - <span class="math">f(-2) = (-2)² - 4 = 4 - 4 = 0</span></div>
                   <div class="step"><b>2. دراسة الشفعية:</b><br><div class="law">القانون: تكون زوجية إذا كان <span class="math">f(-x) = f(x)</span></div>
                   نحسب <span class="math">f(-x) = (-x)² - 4</span>. وبما أن المربع يلغي الإشارة السالبة فإن: <span class="math">(-x)² = x²</span>.<br>
                   إذن <span class="math">f(-x) = x² - 4 = f(x)</span>. النتيجة: الدالة <b>زوجية</b> ومنحناها متناظر بالنسبة لمحور التراتيب.</div>
                   <div class="step"><b>3. اتجاه التغير (المنهجية):</b><br>نفرض <span class="math">x1</span> و <span class="math">x2</span> من المجال <span class="math">[0, +∞[</span> حيث <span class="math">x1 < x2</span>.<br>
                   بتربيع الطرفين (الدالة متزايدة على الموجب): <span class="math">x1² < x2²</span>.<br>
                   بطرح 4 من الطرفين: <span class="math">x1² - 4 < x2² - 4</span> أي <span class="math">f(x1) < f(x2)</span>.<br>
                   النتيجة: الدالة <b>متزايدة تماماً</b> على المجال المذكور.</div>
                   <div class="step"><b>4. جدول التغيرات:</b><br>
                   <table class="variation-table"><tr><td class="row-label">x</td><td>-∞</td><td>0</td><td>+∞</td></tr><tr><td class="row-label">f(x)</td><td>+∞ <span class="arrow">↘</span></td><td><span class="math">-4</span></td><td><span class="arrow">↗</span> +∞</td></tr></table></div>
                   <div class="step"><b>5. التقاطع مع محور الفواصل:</b><br>نحل المعادلة <span class="math">f(x) = 0</span> أي <span class="math">x² - 4 = 0</span>.<br>
                   ننقل 4 للطرف الآخر: <span class="math">x² = 4</span>.<br>
                   بجذر الطرفين نجد: <span class="math">x = 2</span> أو <span class="math">x = -2</span>. النقاط هي <span class="math">(2, 0)</span> و <span class="math">(-2, 0)</span>.</div>`;
            drawGraphs("f(x) = x² - 4", 1);
        }
        // يمكن إضافة مستويات الدوال الأخرى هنا بنفس التفصيل
    }
        else if (type === 'prob') {
        title = "الاحتمالات - سحب الكرات";
        ex = `<div class="question">كيس به <span class="math">3</span> كرات بيضاء و <span class="math">2</span> سوداء. نسحب كرتين بالإرجاع.<br>1. ما هو عدد الحالات الإجمالية؟<br>2. احسب احتمال سحب كرتين بيضاوين.<br>3. احسب احتمال سحب كرتين من لونين مختلفين.<br>4. عرف المتغير العشوائي <span class="math">X</span> لعدد الكرات السوداء.<br>5. احسب الأمل الرياضياتي <span class="math">E(X)</span>.</div>`;
        sol = `<div class="step"><b>1. عدد الحالات الإجمالية:</b><br>بما أن السحب "بالإرجاع"، نستخدم مبدأ الجداء: <span class="math">5 \times 5 = 25</span> حالة ممكنة.</div>
               <div class="step"><b>2. كرتان بيضاوان:</b><br>احتمال البيضاء في السحبة الأولى هو <span class="math">3/5</span> وفي الثانية <span class="math">3/5</span>.<br>
               الجداء: <span class="math">P(BB) = (3/5) \times (3/5) = 9/25 = 0.36</span>.</div>
               <div class="step"><b>3. لونين مختلفين:</b><br>الحالات هي (بيضاء، سوداء) أو (سوداء، بيضاء).<br>
               <span class="math">P = (3/5 \times 2/5) + (2/5 \times 3/5) = 6/25 + 6/25 = 12/25 = 0.48</span>.</div>
               <div class="step"><b>4. قانون احتمال X:</b><br>قيم <span class="math">X</span> الممكنة: <span class="math">{0, 1, 2}</span> سوداء.<br>
               - <span class="math">P(X=0)</span> (لا سوداء): <span class="math">9/25 = 0.36</span><br>
               - <span class="math">P(X=1)</span> (واحدة سوداء): <span class="math">12/25 = 0.48</span><br>
               - <span class="math">P(X=2)</span> (اثنتان سوداء): <span class="math">4/25 = 0.16</span></div>
               <div class="step"><b>5. الأمل الرياضياتي:</b><br><div class="law">القانون: <span class="math">E(X) = \sum (xi \times pi)</span></div>
               <span class="math">E(X) = (0 \times 0.36) + (1 \times 0.48) + (2 \times 0.16) = 0.48 + 0.32 = 0.8</span>.</div>`;
    }

    document.getElementById("title").innerHTML = title;
    document.getElementById("content").innerHTML = ex;
    document.getElementById("sol").innerHTML = sol;
}

function drawGraphs(formulaLabel, level) {
    let ctx = document.getElementById("graph").getContext("2d");
    let labels = []; let dataF = [];
    for (let x = -3; x <= 3; x += 0.2) {
        labels.push(x.toFixed(1));
        dataF.push(x * x - 4);
    }
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{ label: formulaLabel, data: dataF, borderColor: "#d32f2f", borderWidth: 3, pointRadius: 0, fill: false }]
        },
        options: { responsive: true, scales: { y: { beginAtZero: false } } }
    });
}

function toggle() {
    let s = document.getElementById("sol");
    let b = document.getElementById("btn-toggle");
    if (s.style.display === "none" || s.style.display === "") {
        s.style.display = "block";
        b.innerText = "إخفاء الحل";
    } else {
        s.style.display = "none";
        b.innerText = "إظهار الحل النموذجي المفصل";
    }
}

function backToMain() {
    document.getElementById("sub-menu").style.display = "none";
    document.getElementById("sub-header").style.display = "none";
    document.getElementById("main-header").style.display = "table";
    document.getElementById("menu").style.display = "flex";
}

function backToSub() {
    document.getElementById("box").style.display = "none";
    document.getElementById("sub-header").style.display = "table";
    document.getElementById("sub-menu").style.display = "flex";
}
</script>
</body>
</html>
