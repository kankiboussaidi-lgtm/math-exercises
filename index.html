<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تمارين الرياضيات - ثانية ثانوي</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f0f2f5; direction: rtl; margin: 0; padding: 20px; }

    .math {
        direction: ltr;
        unicode-bidi: embed;
        display: inline-block;
        font-family: "Courier New", Courier, monospace;
        font-weight: bold;
        color: #c62828;
        background: #fff5f5;
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid #ffcdd2;
    }

    h1.main-title, #sub-header {
        text-align: center;
        color: #004d40;
        margin-bottom: 30px;
        font-size: 2.2rem;
        border-bottom: 4px double #00695C;
        display: table;
        margin: 0 auto 30px auto;
    }

    #sub-header { display: none; color: #c62828; border-bottom-color: #c62828; }

    #menu, #sub-menu { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
    #sub-menu { display: none; }

    button {
        width: 350px;
        max-width: 90%;
        padding: 18px;
        margin: 12px auto;
        display: block;
        font-size: 20px;
        background: #00695C; 
        color: white;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,105,92,0.2);
    }

    button:hover { background: #004d40; transform: translateY(-3px); }

    #box {
        display: none;
        background: white;
        width: 95%;
        max-width: 1000px;
        margin: 20px auto;
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    #title { text-align: center; color: #00695C; border-bottom: 3px solid #00695C; padding-bottom: 15px; margin-bottom: 25px; }

    .question { margin-top: 25px; line-height: 2.2; font-size: 19px; color: #1a1a1a; font-weight: 600;}

    .step { margin-top: 20px; color: #333; padding: 20px; border-right: 5px solid #00695C; background: #f1f8f7; border-radius: 0 10px 10px 0; }
    .step b { color: #004d40; display: block; margin-bottom: 12px; font-size: 1.2rem; text-decoration: underline; }

    .variation-table {
        width: 100%;
        max-width: 550px;
        margin: 25px auto; 
        border-collapse: collapse;
        background: white;
    }
    .variation-table td {
        border: 2px solid #00695C;
        padding: 15px;
        text-align: center;
        font-weight: bold;
    }
    .row-label { background: #e0f2f1; color: #004d40; width: 80px; }
    .arrow { font-size: 24px; color: #00695C; font-weight: bold; }

    canvas { margin: 30px auto; max-width: 100% !important; border-radius: 15px; background: #fff; border: 1px solid #eee; display: block; }

    #sol { display: none; margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; }

    .btn-back, .btn-sol { background: #00695C !important; margin-top: 30px; }
</style>
</head>
    <body>

<h1 id="main-header" class="main-title">تمارين رياضيات ثانية ثانوي</h1>
<h1 id="sub-header"></h1>

<div id="menu">
    <button onclick="showSubMenu('func')">دوال</button>
    <button onclick="showSubMenu('prob')">احتمالات</button>
    <button onclick="showSubMenu('ang')">زوايا موجهة</button>
</div>

<div id="sub-menu">
    <button id="btn1">تمرين سهل</button>
    <button id="btn2">تمرين متوسط</button>
    <button id="btn3">تمرين صعب</button>
    <button class="btn-back" onclick="backToMain()">العودة</button>
</div>

<div id="box">
    <h2 id="title"></h2>
    <div id="content"></div>
    <canvas id="graph" width="400" height="250"></canvas>
    
    <button id="btn-toggle" class="btn-sol" onclick="toggle()">إظهار الحل النموذجي المفصل</button>
    <div id="sol"></div>

    <button class="btn-back" onclick="backToSub()">العودة للمستويات</button>
</div>

<script>
let chart;

function showSubMenu(type) {
    document.getElementById("main-header").style.display = "none";
    let subHeader = document.getElementById("sub-header");
    subHeader.style.display = "table";
    if(type === 'func') subHeader.innerText = "تمارين الدوال";
    if(type === 'prob') subHeader.innerText = "تمارين الاحتمالات";
    if(type === 'ang') subHeader.innerText = "تمارين الزوايا الموجهة";
    document.getElementById("menu").style.display = "none";
    document.getElementById("sub-menu").style.display = "flex";
    document.getElementById("btn1").onclick = () => loadExercise(type, 1);
    document.getElementById("btn2").onclick = () => loadExercise(type, 2);
    document.getElementById("btn3").onclick = () => loadExercise(type, 3);
}

function resetSolutionBtn() {
    document.getElementById("sol").style.display = "none";
    document.getElementById("btn-toggle").innerText = "إظهار الحل النموذجي المفصل";
}

function loadExercise(type, level) {
    resetSolutionBtn();
    document.getElementById("sub-menu").style.display = "none";
    document.getElementById("box").style.display = "block";
    let ex = "", sol = "", title = "";
    document.getElementById("graph").style.display = (type === 'func') ? "block" : "none";

    if (type === 'func') {
        if (level === 1) {
            title = "سهل - الدوال التربيعية";
            ex = `<div class="question">f(x) = x² - 4 على R.<br>1) احسب f(0), f(2).<br>2) ادرس الشفعية.<br>3) ادرس التغيرات.<br>4) جدول التغيرات.<br>5) التقاطع مع المحاور.</div>`;
            sol = `<div class="step"><b>1) الصور:</b> f(0)=-4, f(2)=0.</div><div class="step"><b>4) جدول التغيرات:</b><table class="variation-table"><tr><td>x</td><td>-∞</td><td>0</td><td>+∞</td></tr><tr><td>f</td><td>+∞ ↘</td><td>-4</td><td>↗ +∞</td></tr></table></div>`;
            drawGraphs("x²-4", 1);
        } else if (level === 2) {
            title = "متوسط - الشكل النموذجي";
            ex = `<div class="question">f(x) = -x² + 4x - 3.<br>1) الشكل النموذجي.<br>2) شعاع الانسحاب.<br>3) اتجاه التغير.<br>4) الجدول.<br>5) فواصل التقاطع.</div>`;
            sol = `<div class="step"><b>1) الشكل:</b> f(x)=-(x-2)²+1.</div><div class="step"><b>2) الانسحاب:</b> V(2,1).</div>`;
            drawGraphs("-x²+4x-3", 2);
        } else {
            title = "صعب - الدوال التناظرية";
            ex = `<div class="question">f(x) = (2x-4)/(x-1).<br>1) Df والمقاربات.<br>2) التفكيك.<br>3) التغيرات.<br>4) الجدول.<br>5) مركز التناظر.</div>`;
            sol = `<div class="step"><b>1) المقاربات:</b> x=1 عمودي، y=2 أفقي.</div>`;
            drawGraphs("(2x-4)/(x-1)", 3);
        }
    } else if (type === 'prob') {
        if (level === 1) {
            title = "احتمالات - سهل";
            ex = `<div class="question">كيس (4 حمراء، 6 خضراء) سحب كرتين بالإرجاع.<br>1) الحالات الكلية.<br>2) كرتان حمراوان.<br>3) لونين مختلفين.<br>4) قيم X.<br>5) الأمل E(X).</div>`;
            sol = `<div class="step"><b>1) الحالات:</b> 10×10=100.</div><div class="step"><b>5) الأمل:</b> E(X)=0.8 (القانون: Σxi.pi).</div>`;
        } else if (level === 2) {
            title = "احتمالات - متوسط";
            ex = `<div class="question">سحب كرتين من {1,2,3,4,5} دون إرجاع.<br>1) الشجرة.<br>2) مجموع زوجي.<br>3) جداء > 10.<br>4) قيم X للمجموع.<br>5) التباين V(X).</div>`;
            sol = `<div class="step"><b>2) مجموع زوجي:</b> (فردي،فردي) أو (زوجي،زوجي) = 8/20 = 0.4.</div>`;
        } else {
            title = "احتمالات - صعب";
            ex = `<div class="question">نردان، X هو الفرق المطلق.<br>1) الجدول.<br>2) قيم X.<br>3) القانون.<br>4) P(X≥3).<br>5) الانحراف σ(X).</div>`;
            sol = `<div class="step"><b>2) القيم:</b> {0,1,2,3,4,5}.</div><div class="step"><b>4) الاحتمال:</b> 12/36 = 1/3.</div>`;
        }
    } else if (type === 'ang') {
        if (level === 1) {
            title = "زوايا - سهل";
            ex = `<div class="question">1) 150° للراديان.<br>2) القيس الرئيسي لـ 13π/3.<br>3) cos(π/3)+sin(π/6).<br>4) تبسيط cos(π-x)+cos x.<br>5) حل sin x = 1.</div>`;
            sol = `<div class="step"><b>2) القيس:</b> 13π/3 = 4π + π/3. القيس هو π/3.</div>`;
        } else if (level === 2) {
            title = "زوايا - متوسط";
            ex = `<div class="question">1) حل 2cos x + √3 = 0.<br>2) تبسيط sin(π-x)+cos(π/2-x).<br>3) حساب cos إذا sin=0.8.<br>4) برهان المتطابقة.<br>5) صور kπ/2.</div>`;
            sol = `<div class="step"><b>1) الحلول:</b> 5π/6 و 7π/6 (لأن cos x = -√3/2).</div>`;
        } else {
            title = "زوايا - صعب";
            ex = `<div class="question">1) تبسيط مجموع cos.<br>2) حل 2sin x - 1 > 0.<br>3) برهان tan x + 1/tan x.<br>4) القيمة الدقيقة لـ cos(π/12).<br>5) مناقشة y=k.</div>`;
            sol = `<div class="step"><b>4) القيمة:</b> (√6+√2)/4 (باستخدام π/3 - π/4).</div>`;
        }
    }
    document.getElementById("title").innerHTML = title;
    document.getElementById("content").innerHTML = ex;
    document.getElementById("sol").innerHTML = sol;
}

function drawGraphs(label, level) {
    let ctx = document.getElementById("graph").getContext("2d");
    let labels = [], data = [];
    for (let x = -3; x <= 5; x += 0.1) {
        let y;
        if (level === 1) y = x*x-4;
        else if (level === 2) y = -x*x+4*x-3;
        else { if(Math.abs(x-1)<0.1) { data.push(null); labels.push(x.toFixed(1)); continue; } y=(2*x-4)/(x-1); }
        labels.push(x.toFixed(1)); data.push(y);
    }
    if (chart) chart.destroy();
    chart = new Chart(ctx, { type: "line", data: { labels: labels, datasets: [{ label: label, data: data, borderColor: "#c62828", fill: false, pointRadius:0 }] }, options: { responsive: true, scales: { y: { min: -10, max: 10 } } } });
}

function toggle() {
    let s = document.getElementById("sol"), b = document.getElementById("btn-toggle");
    s.style.display = (s.style.display === "none") ? "block" : "none";
    b.innerText = (s.style.display === "none") ? "إظهار الحل النموذجي المفصل" : "إخفاء الحل";
}

function backToMain() {
    document.getElementById("sub-menu").style.display = "none";
    document.getElementById("sub-header").style.display = "none";
    document.getElementById("main-header").style.display = "table";
    document.getElementById("menu").style.display = "flex";
}

function backToSub() {
    document.getElementById("box").style.display = "none";
    document.getElementById("sub-header").style.display = "table";
    document.getElementById("sub-menu").style.display = "flex";
}
</script>
</body>
</html>
