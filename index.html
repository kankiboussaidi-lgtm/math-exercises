<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تمارين الرياضيات - ثانية ثانوي</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#f0f2f5; direction: rtl; margin: 0; padding: 20px; }

    /* الإطار الأحمر المطلوب للحفاظ عليه للمصطلحات الرياضية */
    .math {
        direction: ltr;
        unicode-bidi: embed;
        display: inline-block;
        font-family: "Courier New", Courier, monospace;
        font-weight: bold;
        color: #c62828;
        background: #fff5f5;
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid #ffcdd2;
    }

    h1.main-title, #sub-header {
        text-align: center;
        color: #004d40;
        margin-bottom: 30px;
        font-size: 2.2rem;
        border-bottom: 4px double #00695C;
        display: table;
        margin: 0 auto 30px auto;
    }

    #sub-header { display: none; color: #c62828; border-bottom-color: #c62828; }

    #menu, #sub-menu { display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
    #sub-menu { display: none; }

    button {
        width: 350px;
        max-width: 90%;
        padding: 18px;
        margin: 12px auto;
        display: block;
        font-size: 20px;
        background: #00695C; 
        color: white;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(0,105,92,0.2);
    }

    button:hover { background: #004d40; transform: translateY(-3px); }

    #box {
        display: none;
        background: white;
        width: 95%;
        max-width: 1000px;
        margin: 20px auto;
        padding: 40px;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    #title { text-align: center; color: #00695C; border-bottom: 3px solid #00695C; padding-bottom: 15px; margin-bottom: 25px; }

    .question { margin-top: 25px; line-height: 2.2; font-size: 19px; color: #1a1a1a; font-weight: 600;}

    .step { margin-top: 20px; color: #333; padding: 20px; border-right: 5px solid #00695C; background: #f1f8f7; border-radius: 0 10px 10px 0; }
    .step b { color: #004d40; display: block; margin-bottom: 12px; font-size: 1.2rem; text-decoration: underline; }

    .variation-table {
        width: 100%;
        max-width: 550px;
        margin: 25px auto; 
        border-collapse: collapse;
        background: white;
    }
    .variation-table td {
        border: 2px solid #00695C;
        padding: 15px;
        text-align: center;
        font-weight: bold;
    }
    .row-label { background: #e0f2f1; color: #004d40; width: 80px; }
    .arrow { font-size: 24px; color: #00695C; font-weight: bold; }

    canvas { margin: 30px auto; max-width: 100% !important; border-radius: 15px; background: #fff; border: 1px solid #eee; display: block; }

    #sol { display: none; margin-top: 30px; border-top: 2px dashed #ccc; padding-top: 20px; }

    .btn-back, .btn-sol { background: #00695C !important; margin-top: 30px; }
</style>
</head>
    <body>

<h1 id="main-header" class="main-title">تمارين رياضيات ثانية ثانوي</h1>
<h1 id="sub-header"></h1>

<div id="menu">
    <button onclick="showSubMenu('func')">دوال</button>
    <button onclick="showSubMenu('prob')">احتمالات</button>
    <button onclick="showSubMenu('ang')">زوايا موجهة</button>
</div>

<div id="sub-menu">
    <button id="btn1">تمرين سهل</button>
    <button id="btn2">تمرين متوسط</button>
    <button id="btn3">تمرين صعب</button>
    <button class="btn-back" onclick="backToMain()">العودة</button>
</div>

<div id="box">
    <h2 id="title"></h2>
    <div id="content"></div>
    <canvas id="graph" width="400" height="250"></canvas>
    
    <button id="btn-toggle" class="btn-sol" onclick="toggle()">إظهار الحل النموذجي المفصل</button>
    <div id="sol"></div>

    <button class="btn-back" onclick="backToSub()">العودة للمستويات</button>
</div>

<script>
let chart;

function showSubMenu(type) {
    document.getElementById("main-header").style.display = "none";
    let subHeader = document.getElementById("sub-header");
    subHeader.style.display = "table";
    if(type === 'func') subHeader.innerText = "تمارين الدوال";
    if(type === 'prob') subHeader.innerText = "تمارين الاحتمالات";
    if(type === 'ang') subHeader.innerText = "تمارين الزوايا الموجهة";
    document.getElementById("menu").style.display = "none";
    document.getElementById("sub-menu").style.display = "flex";
    document.getElementById("btn1").onclick = () => loadExercise(type, 1);
    document.getElementById("btn2").onclick = () => loadExercise(type, 2);
    document.getElementById("btn3").onclick = () => loadExercise(type, 3);
}

function resetSolUI() {
    document.getElementById("sol").style.display = "none";
    document.getElementById("btn-toggle").innerText = "إظهار الحل النموذجي المفصل";
}

function loadExercise(type, level) {
    resetSolUI();
    document.getElementById("sub-menu").style.display = "none";
    document.getElementById("box").style.display = "block";
    let ex = "", sol = "", title = "";
    document.getElementById("graph").style.display = (type === 'func') ? "block" : "none";

    if (type === 'func') {
        if (level === 1) {
            title = "دوال: تمرين سهل - الدالة مربع";
            ex = `<div class="question">لتكن الدالة <span class="math">f(x) = x² - 4</span>.<br>1) احسب صُور الأعداد 0، 2، و -2.<br>2) ادرس شفعية الدالة f.<br>3) ادرس اتجاه تغير f على المجالات.<br>4) شكّل جدول التغيرات.<br>5) عيّن نقاط التقاطع مع المحاور.</div>`;
            sol = `<div class="step"><b>1) الصور:</b> <span class="math">f(0)=-4</span>, <span class="math">f(2)=0</span>, <span class="math">f(-2)=0</span>.</div>
                   <div class="step"><b>2) الشفعية:</b> <span class="math">f(-x) = (-x)²-4 = x²-4 = f(x)</span>. الدالة زوجية، متناظرة حول محور التراتيب.</div>
                   <div class="step"><b>3) التغيرات:</b> متناقصة تماماً على <span class="math">]-∞, 0]</span> ومتزايدة تماماً على <span class="math">[0, +∞[</span>.</div>
                   <div class="step"><b>4) جدول التغيرات:</b><table class="variation-table"><tr><td>x</td><td>-∞</td><td>0</td><td>+∞</td></tr><tr><td>f(x)</td><td>+∞ ↘</td><td>-4</td><td>↗ +∞</td></tr></table></div>
                   <div class="step"><b>5) التقاطع:</b> مع التراتيب في <span class="math">(0,-4)</span> ومع الفواصل في <span class="math">(2,0)</span> و <span class="math">(-2,0)</span>.</div>`;
            drawGraphs("f(x) = x² - 4", 1);
        } else if (level === 2) {
            title = "دوال: تمرين متوسط - الشكل النموذجي";
            ex = `<div class="question">f(x) = -x² + 4x - 3.<br>1) الشكل النموذجي.<br>2) شعاع الانسحاب.<br>3) اتجاه التغير.<br>4) الجدول.<br>5) فواصل التقاطع مع محور x.</div>`;
            sol = `<div class="step"><b>1) الشكل النموذجي:</b> <span class="math">f(x) = -(x-2)²+1</span>.</div>
                   <div class="step"><b>2) الانسحاب:</b> شعاع الانسحاب هو <span class="math">V(2, 1)</span>.</div>
                   <div class="step"><b>3) التغيرات:</b> متزايدة على <span class="math">]-∞, 2]</span> ومتناقصة على <span class="math">[2, +∞[</span>.</div>
                   <div class="step"><b>4) الجدول:</b> يبلغ الذروة عند القيمة 1 عندما <span class="math">x=2</span>.</div>
                   <div class="step"><b>5) التقاطع:</b> بحل <span class="math">f(x)=0</span> نجد <span class="math">x=1</span> و <span class="math">x=3</span>.</div>`;
            drawGraphs("f(x) = -x² + 4x - 3", 2);
        } else {
            title = "دوال: تمرين صعب - دالة تناظرية";
            ex = `<div class="question">f(x) = (2x-4)/(x-1).<br>1) Df والمقاربات.<br>2) التفكيك: <span class="math">f(x) = a + b/(x-1)</span>.<br>3) اتجاه التغير.<br>4) الجدول.<br>5) مركز التناظر.</div>`;
            sol = `<div class="step"><b>1) المقاربات:</b> <span class="math">Df = R - {1}</span>. المقارب العمودي <span class="math">x=1</span> والأفقي <span class="math">y=2</span>.</div>
                   <div class="step"><b>2) التفكيك:</b> <span class="math">f(x) = 2 - 2/(x-1)</span>.</div>
                   <div class="step"><b>3) التغيرات:</b> متزايدة تماماً على مجالي التعريف.</div>
                   <div class="step"><b>4) الجدول:</b> تزايد في الجهتين مع وجود خطين عموديين عند 1.</div>
                   <div class="step"><b>5) مركز التناظر:</b> النقطة <span class="math">ω(1, 2)</span> هي مركز تناظر للمنحنى.</div>`;
            drawGraphs("f(x) = (2x-4)/(x-1)", 3);
        }
    }    else if (type === 'prob') {
        if (level === 1) {
            title = "احتمالات: تمرين سهل";
            ex = `<div class="question">سحب كرتين بالإرجاع من كيس (3 بيضاء، 2 سوداء).<br>1) عدد الحالات الكلية.<br>2) احتمال كرتين من نفس اللون.<br>3) بيضاء واحدة على الأقل.<br>4) قيم X لعدد البيضاء.<br>5) الأمل E(X).</div>`;
            sol = `<div class="step"><b>1) الحالات:</b> <span class="math">5×5=25</span>.</div><div class="step"><b>2) نفس اللون:</b> <span class="math">13/25 = 0.52</span>.</div><div class="step"><b>3) بيضاء على الأقل:</b> <span class="math">21/25 = 0.84</span>.</div><div class="step"><b>4) قيم X:</b> {0, 1, 2}.</div><div class="step"><b>5) الأمل:</b> <span class="math">E(X) = 1.2</span>.</div>`;
        } else if (level === 2) {
            title = "احتمالات: تمرين متوسط";
            ex = `<div class="question">سحب كرتين بدون إرجاع من صندوق فيه 10 كرات.<br>1) الحالات الكلية.<br>2) سحب رقمين زوجيين.<br>3) المجموع يساوي 5.<br>4) قانون الاحتمال لـ X (فردي).<br>5) التباين V(X).</div>`;
            sol = `<div class="step"><b>1) الحالات:</b> <span class="math">10×9=90</span>.</div><div class="step"><b>2) زوجيان:</b> <span class="math">20/90 = 2/9</span>.</div><div class="step"><b>3) المجموع 5:</b> 4 حالات، الاحتمال <span class="math">4/90</span>.</div><div class="step"><b>4) القانون:</b> P(0)=20/90, P(1)=50/90, P(2)=20/90.</div><div class="step"><b>5) التباين:</b> <span class="math">V(X) = 0.44</span>.</div>`;
        } else {
            title = "احتمالات: تمرين صعب";
            ex = `<div class="question">رمي زهرتي نرد، X هي القيمة الكبرى.<br>1) جدول الحالات (36).<br>2) قيم X.<br>3) قانون الاحتمال.<br>4) <span class="math">P(X ≤ 3)</span>.<br>5) الانحراف المعياري σ(X).</div>`;
            sol = `<div class="step"><b>2) القيم:</b> {1,2,3,4,5,6}.</div><div class="step"><b>3) القانون:</b> يعتمد على تكرار كل رقم كحد أقصى.</div><div class="step"><b>4) الاحتمال:</b> <span class="math">9/36 = 0.25</span>.</div><div class="step"><b>5) الانحراف:</b> <span class="math">σ(X) ≈ 1.40</span>.</div>`;
        }
    } else if (type === 'ang') {
        if (level === 1) {
            title = "زوايا: تمرين سهل";
            ex = `<div class="question">1) 150° للراديان.<br>2) القيس الرئيسي لـ <span class="math">13π/3</span>.<br>3) حساب cos و sin.<br>4) تبسيط عبارة cos.<br>5) حل معادلة cos x = 1/2.</div>`;
            sol = `<div class="step"><b>1) التحويل:</b> <span class="math">5π/6</span>.</div><div class="step"><b>2) القيس:</b> <span class="math">π/3</span>.</div><div class="step"><b>3) القيمة:</b> <span class="math">-1/2</span> و <span class="math">-√2/2</span>.</div><div class="step"><b>4) التبسيط:</b> النتيجة 0.</div><div class="step"><b>5) الحل:</b> <span class="math">x = π/3</span>.</div>`;
        } else if (level === 2) {
            title = "زوايا: تمرين متوسط";
            ex = `<div class="question">1) تبسيط عبارة E.<br>2) حساب sin إذا cos=0.6.<br>3) برهان متطابقة المربع.<br>4) حل sin x = √2/2.<br>5) صور الأعداد kπ/2.</div>`;
            sol = `<div class="step"><b>1) التبسيط:</b> <span class="math">E = cos x</span>.</div><div class="step"><b>2) sin:</b> <span class="math">sin x = 0.8</span>.</div><div class="step"><b>3) البرهان:</b> تم باستخدام <span class="math">cos²x+sin²x=1</span>.</div><div class="step"><b>4) الحل:</b> <span class="math">π/4</span> و <span class="math">3π/4</span>.</div><div class="step"><b>5) الصور:</b> هي رؤوس مربع على الدائرة.</div>`;
        } else {
            title = "زوايا: تمرين صعب";
            ex = `<div class="question">1) القيمة الدقيقة لـ cos(π/12).<br>2) حل <span class="math">2sin²x + sin x - 1 = 0</span>.<br>3) برهان <span class="math">cos⁴x - sin⁴x = cos(2x)</span>.<br>4) تبسيط مجموع cos.<br>5) مناقشة y=k.</div>`;
            sol = `<div class="step"><b>1) القيمة:</b> <span class="math">(√2+√6)/4</span>.</div><div class="step"><b>2) الحلول:</b> <span class="math">π/6, 5π/6, 3π/2</span>.</div><div class="step"><b>3) البرهان:</b> يعتمد على مطابقة فرق مربعين.</div><div class="step"><b>4) التبسيط:</b> النتيجة 0.</div><div class="step"><b>5) المناقشة:</b> حسب k بالنسبة لـ 1.</div>`;
        }
    }
    document.getElementById("title").innerHTML = title;
    document.getElementById("content").innerHTML = ex;
    document.getElementById("sol").innerHTML = sol;
}

function drawGraphs(formulaLabel, level) {
    let ctx = document.getElementById("graph").getContext("2d");
    let labels = []; let dataF = [];
    for (let x = -3; x <= 5.1; x += 0.1) {
        labels.push(x.toFixed(1));
        let y;
        if (level === 1) y = x * x - 4;
        if (level === 2) y = -x * x + 4 * x - 3;
        if (level === 3) {
            if (Math.abs(x - 1) < 0.1) y = null;
            else y = (2*x - 4) / (x - 1);
        }
        dataF.push(y);
    }
    if (chart) chart.destroy();
    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{ label: formulaLabel, data: dataF, borderColor: "#c62828", borderWidth: 3, pointRadius: 0, fill: false, spanGaps: false }]
        },
        options: { responsive: true }
    });
}

function toggle() {
    let s = document.getElementById("sol"), b = document.getElementById("btn-toggle");
    s.style.display = (s.style.display === "none") ? "block" : "none";
    b.innerText = (s.style.display === "none") ? "إظهار الحل النموذجي المفصل" : "إخفاء الحل";
}

function backToMain() {
    document.getElementById("sub-menu").style.display = "none";
    document.getElementById("sub-header").style.display = "none";
    document.getElementById("main-header").style.display = "table";
    document.getElementById("menu").style.display = "flex";
}

function backToSub() {
    document.getElementById("box").style.display = "none";
    document.getElementById("sub-header").style.display = "table";
    document.getElementById("sub-menu").style.display = "flex";
}
</script>
</body>
</html>
