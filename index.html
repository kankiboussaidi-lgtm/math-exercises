<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تمارين الرياضيات - ثانية ثانوي</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family: Arial, sans-serif;
background:#f2f2f2;
direction: rtl;
margin: 0;
padding: 10px;
}

/* مهم: الرياضيات لا تنقلب */
.math{
direction: ltr;
unicode-bidi: embed;
display: inline-block;
}

h1{
    text-align:center;
    font-size: 22px; /* تصغير العنوان قليلاً ليناسب الموبايل */
    color: #004D40;
}

#menu{
display:flex;
flex-direction:column;
align-items:center;
}

button{
width:100%; /* جعل الأزرار تأخذ العرض الكامل في الموبايل */
max-width: 280px;
padding:15px;
margin:10px;
font-size:18px;
background:#00695C;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

#box{
display:none;
background:white;
width:95%;
margin:10px auto;
padding:15px;
border-radius:15px;
box-sizing: border-box; /* لضمان عدم خروج المحتوى عن الحواف */
}

.question{margin-top:15px; line-height:1.6; font-size: 17px;}
.step{margin-top:6px; font-size: 16px;}

table{
border-collapse:collapse;
width:100%;
margin-top:15px;
text-align:center;
font-size: 14px;
}

td,th{
border:1px solid #ccc;
padding:8px;
}

/* جعل المنحنى يستجيب لحجم الشاشة */
canvas{
    display:none;
    max-width: 100% !important;
    height: auto !important;
}

#btn {
    background: #E64A19;
    margin-top: 20px;
}

button[onclick="back()"] {
    background: #757575;
}
</style>
</head>

<body>

<h1>تمارين الرياضيات - ثانية ثانوي</h1>

<div id="menu">
<button onclick="show('func')">الدوال</button>
<button onclick="show('prob')">الإحتمالات</button>
<button onclick="show('ang')">الزوايا الموجهة</button>
</div>

<div id="box">

<h2 id="title" style="color:#00695C; text-align:center;"></h2>

<div id="content"></div>

<canvas id="graph"></canvas>

<button id="btn" onclick="toggle()">إظهار الحل النموذجي</button>
<div id="sol"></div>

<button onclick="back()" style="width: 100%; margin-top: 30px;">رجوع للقائمة</button>

</div>

<script>
let chart;

/* ================= المنحنى (فقط الدوال) ================= */
function draw(){
let ctx=document.getElementById("graph").getContext("2d");
let x=[], y=[];
for(let i=-6;i<=6;i+=0.5){
x.push(i);
y.push(i*i-8*i+15);
}
if(chart) chart.destroy();
chart=new Chart(ctx,{
type:"line",
data:{
labels:x,
datasets:[{
label:"f(x)=x²-8x+15",
data:y,
borderColor: "#00695C",
fill: false,
borderWidth:2
}]
},
options: {
    responsive: true,
    maintainAspectRatio: true
}
});
}

/* ================= العرض ================= */
function show(type){
document.getElementById("menu").style.display="none";
document.getElementById("box").style.display="block";
let ex="", sol="", title="";
let g=document.getElementById("graph");
g.style.display="none";

if(type==="func"){
g.style.display="block";
title="تمرين الدوال";
ex=`
<div class="question">لدينا الدالة: <span class="math">f(x)=x²-8x+15</span></div>
<div class="question">1) أعد كتابتها على شكل مربع كامل.</div>
<div class="question">2) استنتج الرأس.</div>
<div class="question">3) حل المتراجحة: <span class="math">f(x) ≤ 0</span></div>
<div class="question">4) حل المعادلة: <span class="math">f(x)=0</span></div>
`;
sol=`
<div class="question"><b>1) التحليل:</b></div>
<div class="step"><span class="math">(x-4)² - 1</span></div>
<hr>
<div class="question"><b>2) الرأس:</b></div>
<div class="step">الرأس: S(4 , -1)</div>
<hr>
<div class="question"><b>5) جدول التغيرات:</b></div>
<table>
<tr><th>x</th><th>-∞</th><th>4</th><th>+∞</th></tr>
<tr><th>f(x)</th><td>↘</td><td>-1</td><td>↗</td></tr>
</table>
`;
setTimeout(draw,200);
}

if(type==="prob"){
title="الإحتمالات";
ex=`<div class="question">صندوق فيه 4 حمراء و3 زرقاء و3 خضراء...</div>`;
sol=`<div class="question"><b>الحل:</b> تعتمد على قانون السحب بدون إرجاع.</div>`;
}

if(type==="ang"){
title="الزوايا الموجهة";
ex=`<div class="question">احسب (AB,AE) إذا علمت...</div>`;
sol=`<div class="question"><b>النتيجة:</b> 90° (زاوية قائمة).</div>`;
}

document.getElementById("title").innerHTML=title;
document.getElementById("content").innerHTML=ex;
document.getElementById("sol").innerHTML=sol;
document.getElementById("sol").style.display="none";
document.getElementById("btn").innerText="إظهار الحل النموذجي";
}

function toggle(){
let s=document.getElementById("sol");
let b=document.getElementById("btn");
if(s.style.display==="none"){
s.style.display="block";
b.innerText="إخفاء الحل النموذجي";
}else{
s.style.display="none";
b.innerText="إظهار الحل النموذجي";
}
}

function back(){
document.getElementById("menu").style.display="flex";
document.getElementById("box").style.display="none";
}
</script>

</body>
</html>
